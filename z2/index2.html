<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вариант 16 - Задание 2</title>
    <meta name="keywords" content="резиновая верстка, grid, вариант 14, ПЗТ-42">
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="container">
    <!-- 4 колонки по 25% = 100% -->
    <header class="block b1">Блок 1 (100%)</header>

    <!-- Блоки 2, 3, 5, 6 занимают по 1 колонке из 4 -->
    <div class="block b2">Блок 2 (25%)</div>
    <div class="block b3">Блок 3 (25%)</div>
    
    <!-- Блок 4 занимает 2 колонки из 4 -->
    <div class="block b4">Блок 4 (50%)</div>

    <div class="block b5">Блок 5 (25%)</div>
    <div class="block b6">Блок 6 (25%)</div>
    
    <!-- Блоки 7 и 8 на всю ширину -->
    <div class="block b7">Блок 7 (100%)</div>
    <div class="block b8">Блок 8 (100%)</div>
    
    <!-- Блоки 9 и 10 по половине ширины -->
    <div class="block b9">Блок 9 (50%)</div>
    <footer class="block b10">Блок 10 (50%)</footer>
</div>


</body>
</html>
